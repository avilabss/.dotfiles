---
- name: Add APT PPAs
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: present
  loop: "{{ apt_ppas | default([]) }}"
  become: true
  when: apt_ppas is defined and apt_ppas | length > 0

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop: "{{ common_packages }}"
  become: true
  register: common_package_install
  failed_when: false
  loop_control:
    label: "{{ item }}"

- name: Track failed common packages
  ansible.builtin.set_fact:
    dotfiles_failed_packages: >-
      {{ (dotfiles_failed_packages | default([]))
         + (common_package_install.results | default([])
            | selectattr('failed', 'defined')
            | selectattr('failed')
            | map(attribute='item')
            | list) }}

- name: Warn about unavailable common packages
  ansible.builtin.debug:
    msg: "Core package {{ item.item }} could not be installed on {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }} / {{ ansible_facts.architecture }}; leaving it in dotfiles and continuing."
  loop: "{{ common_package_install.results | default([]) }}"
  when: item.failed | default(false)
  loop_control:
    label: "{{ item.item }}"
