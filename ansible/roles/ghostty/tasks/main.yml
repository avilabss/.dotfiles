---
- name: Include macOS ghostty tasks
  ansible.builtin.include_tasks: macos.yml
  when: "'macos' in group_names"

- name: Include Debian ghostty tasks
  ansible.builtin.include_tasks: debian.yml
  when: "'debian' in group_names"

- name: Include Fedora ghostty tasks
  ansible.builtin.include_tasks: fedora.yml
  when: "'fedora' in group_names"

- name: Check for conflicting Ghostty config
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.config/ghostty/config"
  register: ghostty_config_conflict

- name: Create Ghostty backup directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.dotfiles_backup/{{ ansible_date_time.iso8601_basic_short }}/.config/ghostty"
    state: directory
    mode: "0755"
  when: ghostty_config_conflict.stat.exists and not ghostty_config_conflict.stat.islnk

- name: Back up conflicting Ghostty config
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.config/ghostty/config"
    dest: "{{ ansible_env.HOME }}/.dotfiles_backup/{{ ansible_date_time.iso8601_basic_short }}/.config/ghostty/config"
    remote_src: true
    mode: preserve
  when: ghostty_config_conflict.stat.exists and not ghostty_config_conflict.stat.islnk

- name: Remove conflicting Ghostty config so stow can take over
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/ghostty/config"
    state: absent
  when: ghostty_config_conflict.stat.exists and not ghostty_config_conflict.stat.islnk

- name: Stow Ghostty config
  ansible.builtin.command: stow -R ghostty
  args:
    chdir: "{{ dotfiles_dir }}"
  register: ghostty_stow_result
  changed_when: ghostty_stow_result.rc == 0
