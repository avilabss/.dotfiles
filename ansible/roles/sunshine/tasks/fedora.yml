---
- name: Enable LizardByte COPR repository
  ansible.builtin.command: dnf copr enable -y {{ sunshine_copr_repo }}
  become: true
  register: copr_result
  failed_when: false
  changed_when: "'enabled' in copr_result.stdout or copr_result.rc == 0"

- name: Track unavailable Sunshine COPR
  ansible.builtin.set_fact:
    dotfiles_failed_packages: "{{ (dotfiles_failed_packages | default([])) + ['sunshine'] }}"
  when: copr_result.rc != 0

- name: Warn about unavailable Sunshine COPR
  ansible.builtin.debug:
    msg: >-
      Sunshine COPR {{ sunshine_copr_repo }} is not available for
      {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }} /
      {{ ansible_facts.architecture }}; skipping Sunshine package install.
      dnf copr output: {{ copr_result.stderr | default(copr_result.stdout) }}
  when: copr_result.rc != 0

- name: Install Sunshine
  block:
    - name: Install Sunshine
      ansible.builtin.dnf:
        name: Sunshine
        state: present
      become: true
  rescue:
    - name: Track failed Sunshine package install
      ansible.builtin.set_fact:
        dotfiles_failed_packages: "{{ (dotfiles_failed_packages | default([])) + ['sunshine'] }}"

    - name: Warn about failed Sunshine package install
      ansible.builtin.debug:
        msg: >-
          Sunshine could not be installed from COPR {{ sunshine_copr_repo }} on
          {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }} /
          {{ ansible_facts.architecture }}; continuing without the package.
  when: copr_result.rc == 0

- name: Install Sunshine firewall packages
  ansible.builtin.dnf:
    name: "{{ sunshine_firewall_packages }}"
    state: present
  become: true

- name: Check if Sunshine command is available
  ansible.builtin.command: which sunshine
  register: sunshine_command_check
  changed_when: false
  failed_when: false

- name: Ensure Sunshine config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/sunshine"
    state: directory
    mode: "0755"
  when: sunshine_command_check.rc == 0

- name: Configure Sunshine CSRF allowed origins
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.config/sunshine/sunshine.conf"
    regexp: "^csrf_allowed_origins\\s*="
    line: "csrf_allowed_origins = {{ sunshine_csrf_allowed_origins | join(',') }}"
    create: true
    mode: "0644"
  register: sunshine_config
  when:
    - sunshine_command_check.rc == 0
    - sunshine_csrf_allowed_origins | length > 0

- name: Enable and start Sunshine user service
  ansible.builtin.systemd_service:
    name: "{{ sunshine_service_name }}"
    scope: user
    enabled: true
    state: "{{ 'restarted' if sunshine_config.changed | default(false) else 'started' }}"
    daemon_reload: true
  when: sunshine_command_check.rc == 0

- name: Enable and start firewalld
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started
  become: true

- name: Allow Sunshine TCP ports through firewalld
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  become: true
  loop:
    - "47984-47990"

- name: Allow Sunshine UDP ports through firewalld
  ansible.posix.firewalld:
    port: "{{ item }}/udp"
    permanent: true
    state: enabled
    immediate: true
  become: true
  loop:
    - "47998-48000"
