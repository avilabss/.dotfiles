---
- name: Check if Docker is installed
  ansible.builtin.command: which docker
  register: docker_check
  changed_when: false
  failed_when: false

- name: Track unsupported Docker apt target
  ansible.builtin.set_fact:
    dotfiles_failed_packages: "{{ (dotfiles_failed_packages | default([])) + ['docker'] }}"
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] not in docker_supported_debian_distributions

- name: Warn about unsupported Docker apt target
  ansible.builtin.debug:
    msg: >-
      Docker's official apt repository is not configured for
      {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }};
      skipping Docker package install.
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] not in docker_supported_debian_distributions

- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] in docker_supported_debian_distributions

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] in docker_supported_debian_distributions

- name: Add Docker apt signing key
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] in docker_supported_debian_distributions

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}
      signed-by=/etc/apt/keyrings/docker.asc] {{ docker_apt_repo_base_url }}
      {{ docker_apt_repo_codename }} stable
    filename: docker
    state: present
    update_cache: true
  become: true
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] in docker_supported_debian_distributions

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  become: true
  when:
    - docker_check.rc != 0
    - ansible_facts['distribution'] in docker_supported_debian_distributions

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ dotfiles_user }}"
    groups: docker
    append: true
  become: true
  when: docker_check.rc == 0 or ansible_facts['distribution'] in docker_supported_debian_distributions
