---
- name: Dotfiles Setup
  hosts: localhost
  gather_facts: true

  pre_tasks:
    - name: Classify host by OS family
      ansible.builtin.group_by:
        key: >-
          {{ 'macos' if ansible_facts['os_family'] == 'Darwin'
             else 'debian' if ansible_facts['distribution'] in ['Debian', 'Ubuntu', 'Pop!_OS', 'Linux Mint']
             else 'fedora' if ansible_facts['distribution'] in ['Fedora', 'CentOS', 'Rocky', 'AlmaLinux']
             else 'unknown' }}
      changed_when: false
      tags: always

    - name: Fail on unsupported OS
      ansible.builtin.fail:
        msg: "Unsupported OS: {{ ansible_facts['distribution'] }} ({{ ansible_facts['os_family'] }})"
      when: group_names | intersect(['macos', 'debian', 'fedora']) | length == 0
      tags: always

  roles:
    - role: common
      tags: [common, always]

    - role: fonts
      tags: [fonts]

    - role: dev_tools
      tags: [dev-tools]

    - role: zsh
      tags: [zsh]

    - role: nvim
      tags: [nvim]

    - role: tmux
      tags: [tmux]

    - role: starship
      tags: [starship]

    - role: opencode
      tags: [opencode, optional]

    - role: ghostty
      tags: [ghostty, optional]

    - role: google_chrome
      tags: [google-chrome, chrome, optional]

    - role: flameshot
      tags: [flameshot, optional]

    - role: docker
      tags: [docker, optional]

    - role: ssh
      tags: [ssh, optional]
      when: ansible_facts['os_family'] != 'Darwin'

    - role: xrdp
      tags: [xrdp, optional]
      when: ansible_facts['os_family'] != 'Darwin'

    - role: qemu
      tags: [qemu, optional]
      when: ansible_facts['os_family'] != 'Darwin'

    - role: sunshine
      tags: [sunshine, optional]

  post_tasks:
    - name: Summarize package install warnings
      ansible.builtin.debug:
        msg:
          - "Some configured packages could not be installed on this host."
          - "They remain in dotfiles; install was skipped here instead of removing them."
          - "Failed packages: {{ dotfiles_failed_packages | unique | join(', ') }}"
      when: dotfiles_failed_packages | default([]) | length > 0

    - name: Installation complete
      ansible.builtin.debug:
        msg:
          - "Setup complete! Next steps:"
          - "  1. Restart your terminal (or source ~/.zshrc)"
          - "  2. In tmux, press Ctrl-a + I to install plugins"
          - "  3. Open neovim - Lazy will auto-install plugins"
          - "  4. Run opencode, then /connect to authenticate OpenAI"
